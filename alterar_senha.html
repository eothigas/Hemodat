<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./sources/alt_senha.css">
    <link rel="icon" href="./images/logo.ico" type="image/ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Hemodat - Alterar Senha</title>
</head>
<body>
    
    <div id="principal">

        <div id="conteudo-cima">
            <a href="./forgot_password.html"><i class="bi bi-arrow-left"></i></a>
            <div id="text">
                <h1>ALTERAR SENHA</h1>
                <p>Crie uma senha nova, de 8 dígitos alfanuméricos
                    e 1 caractere especial.</p>
            </div>
        </div>
        <div id="conteudo-baixo">
            <form id="rec-pass" action="/php/alterar_senha.php" method="post">
                <div class="input-container">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="senha" placeholder="Senha Nova" maxLength='8'>
                </div>
                <div class="input-container">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="confirm-senha" placeholder="Repita a Senha" maxLength='8'>
                </div>

                <button type="submit" id="send">Alterar</button>
            </form>
        </div>
    </div>

    <script src='/javascript/alterar_senha.js'></script>

</body>
</html>
